inherit_mode:
  merge:
    - Include

AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.4
  Include:
    - "**/*.rb"
    - bin/agent-coord
    - bin/agent_coord
    - Gemfile

Layout/LineLength:
  Max: 120

Metrics/AbcSize:
  Max: 60

Metrics/ClassLength:
  Max: 650

Metrics/CyclomaticComplexity:
  Max: 15

Metrics/MethodLength:
  Max: 45

Metrics/ModuleLength:
  Max: 900

Metrics/PerceivedComplexity:
  Max: 15

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: false
